; ============================================================================
; EVEE Link — a wireless throttle link for VESC-based boards.
;
;   [env:remote]    the handheld. Hall throttle -> ESP-NOW.
;   [env:receiver]  lives on the board. ESP-NOW -> VESC UART.
;
; Both are bare ESP32-S3 nodes. Neither depends on ESK8OS; the only thing they
; share with it (or with each other) is include/evee_link.h.
;
; Target hardware is the Hosyond ESP32-S3-WROOM-1 N16R8, which is pin- and
; flash-compatible with the generic esp32-s3-devkitc-1 definition. A Seeed XIAO
; ESP32-S3 remote is a drop-in later (see [env:remote_xiao]).
; ============================================================================

[platformio]
default_envs = receiver

[env]
platform  = espressif32
framework = arduino
monitor_speed = 115200
monitor_echo  = yes
build_flags = -Iinclude -Isrc/common -Wall

; ---------------------------------------------------------------------------
; Receiver: ESP-NOW in, VESC UART out. No display, no BLE, no WiFi AP — one job,
; deterministic loop. EVEE_VESC_ENABLED=0 means it logs the command it WOULD
; send instead of sending it: that is the safe default, and it is how every
; stage before a motor is attached gets tested.
; ---------------------------------------------------------------------------
[env:receiver]
board = esp32-s3-devkitc-1
board_upload.flash_size = 16MB
build_src_filter = +<common/> +<receiver/>
build_flags =
    ${env.build_flags}
    -DEVEE_ROLE_RECEIVER=1
    -DEVEE_VESC_ENABLED=0
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; The same firmware, but actually driving the motor. Separate env so that
; "flash the receiver" can never accidentally mean "flash the one that moves".
[env:receiver_live]
extends = env:receiver
build_flags =
    ${env:receiver.build_flags}
    -UEVEE_VESC_ENABLED
    -DEVEE_VESC_ENABLED=1

; ---------------------------------------------------------------------------
; Remote: reads a throttle, sends it. On a bare Hosyond for bring-up; the
; throttle source is synthetic (serial console) until a hall sensor exists.
; ---------------------------------------------------------------------------
[env:remote]
board = esp32-s3-devkitc-1
board_upload.flash_size = 16MB
build_src_filter = +<common/> +<remote/>
build_flags =
    ${env.build_flags}
    -DEVEE_ROLE_REMOTE=1
    -DEVEE_THROTTLE_SYNTHETIC=1
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
    adafruit/Adafruit SSD1306 @ ^2.5.9
    adafruit/Adafruit GFX Library @ ^1.11.9

; Seeed XIAO ESP32-S3 — the eventual printed-remote body (onboard LiPo charging,
; thumbnail-sized). 8MB flash, so the partition layout differs from the Hosyond.
[env:remote_xiao]
extends = env:remote
board = seeed_xiao_esp32s3
board_upload.flash_size = 8MB
